<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    


<button id="btnAgregar">Agregar plato</button>

<div id="carta">PEPE</div>

<script>
    let platos = [
        { id: 1, nombre: "Lomo saltado", categoria: "segundos", precio: 18, stock: 3, disponible: true },
        { id: 2, nombre: "Arroz con pollo", categoria: "segundos", precio: 12, stock: 5, disponible: true },
        { id: 3, nombre: "Sopa de verduras", categoria: "entradas", precio: 8, stock: 0, disponible: false },
    ];


    /*Eventos*/

    document.getElementById("btnAgregar").addEventListener("click", agregarPlato);


    function renderCarta(platos) {
        let carta = document.getElementById("carta");
        carta.innerHTML = "";
        let hmtl = '<ul>'
        for (let i = 0; i < platos.length; i++) {
            let plato = platos[i];
            hmtl += '<li>' + 'Nombre: ' + plato.nombre + ' Categoria: ' + plato.categoria +
                ' Precio : S/ ' + plato.precio + plato.stock + plato.disponible + (plato.disponible === true ? "✅" : "❌") + '</li>';
        }   
        hmtl += '</ul>';
        carta.innerHTML = hmtl;
    }

    function agregarPlato() {
        platos.push({
            id: platos.length + 1,
            nombre: "papa",
            categoria: "segundos",
            precio: 18,
            stock: 3,
            disponible: true
        });
        renderCarta(platos);
    }


</script>




</body>
</html>
