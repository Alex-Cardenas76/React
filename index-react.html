<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="root">
        <h1>hola</h1>

    </div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>



    <script type="text/babel">
        let platos = [
            { id: 1, nombre: "Lomo saltado", categoria: "segundos", precio: 18, stock: 3, disponible: "si" },
            { id: 2, nombre: "Arroz con pollo", categoria: "segundos", precio: 12, stock: 5, disponible: "si" },
            { id: 3, nombre: "Sopa de verduras", categoria: "entradas", precio: 8, stock: 0, disponible: "no" },
        ];
        let dibujos = [
            { id: 1, nombre: "goku", categoria: "segundos", precio: 18, stock: 3, disponible: "si" },
            { id: 2, nombre: "naruto", categoria: "segundos", precio: 12, stock: 5, disponible: "si" },
            { id: 3, nombre: "luffy", categoria: "entradas", precio: 8, stock: 0, disponible: "no" },
        ];


        // 1. Esto es un "Componente" de React (empieza con Mayúscula)
        // js + html
        function RenderCarta({ platos }) {
            let esto = platos.map((plato) => (
                <ul key={plato.id}>
                    <li>Nombre: {plato.nombre}</li>
                    <li>Categoria: {plato.categoria}</li>
                    <li>Precio: S/ {plato.precio}</li>
                    <li>Stock: {plato.stock}</li>
                    <li>Disponible: {plato.disponible}</li>
                </ul>
            ))
            // 2. React usa .map() para crear listas, no un for "limpio"
            return (
                <div>
                    <h1>Carta de platos</h1>
                    <h2>aqui ta:</h2>
                    {esto}
                </div>
            )
                ;
        }


        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(
            <div>
                <RenderCarta platos={platos} />
                <RenderCarta platos={dibujos} />
            </div>);

    </script>

</body>

</html>
